  <!-- ── CURSOR SVG ── -->
<div id="cursor">
  <svg width="52" height="80" viewBox="0 0 52 80" xmlns="http://www.w3.org/2000/svg">
    <!-- String from hole to top of page -->
    <line x1="26" y1="0" x2="26" y2="14" stroke="#8B7355" stroke-width="1.2" stroke-linecap="round"/>
 
    <!-- The tag body -->
    <rect id="tag-body" x="4" y="14" width="44" height="62" rx="3" ry="3" fill="#F9F5EE" stroke="#C8BB9F" stroke-width="1"/>
 
    <!-- Punched hole -->
    <circle cx="26" cy="20" r="3.5" fill="none" stroke="#B0A085" stroke-width="1.2"/>
 
    <!-- Horizontal stitch lines (top) -->
    <line x1="11" y1="29" x2="41" y2="29" stroke="#D4C9B2" stroke-width="0.8" stroke-dasharray="3 2"/>
 
    <!-- offmark logo -->
    <image href="Images/White/logo.png" x="8" y="30" width="36" height="36"/> 
    
    <!-- Horizontal stitch lines (bottom) -->
    <line x1="11" y1="66" x2="41" y2="66" stroke="#D4C9B2" stroke-width="0.8" stroke-dasharray="3 2"/>
 
    <!-- brand name -->
    <text x="26" y="73" text-anchor="middle" font-family="'DM Mono', monospace" font-size="7" fill="#8B7B68">OffMark</text>
  </svg>
